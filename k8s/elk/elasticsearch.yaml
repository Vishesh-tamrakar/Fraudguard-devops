---
# Elasticsearch Deployment for FraudGuard ELK Stack
# Log aggregation and indexing engine
# Version: 8.13.0 (from SRS §7.4)

apiVersion: v1
kind: Namespace
metadata:
  name: elk
  labels:
    name: elk

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: elk
  labels:
    app: elasticsearch
    component: storage

spec:
  replicas: 1
  
  selector:
    matchLabels:
      app: elasticsearch
  
  template:
    metadata:
      labels:
        app: elasticsearch
        component: storage
    
    spec:
      # Init container to set vm.max_map_count (required for Elasticsearch)
      initContainers:
        - name: set-vm-max-map-count
          image: busybox:1.35
          command:
            - 'sh'
            - '-c'
            - 'sysctl -w vm.max_map_count=262144'
          securityContext:
            privileged: true
      
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
          imagePullPolicy: IfNotPresent
          
          ports:
            - name: http
              containerPort: 9200
              protocol: TCP
            - name: node
              containerPort: 9300
              protocol: TCP
          
          env:
            # Cluster setup
            - name: cluster.name
              value: "fraudguard-cluster"
            - name: node.name
              value: "elasticsearch-node-1"
            - name: discovery.type
              value: "single-node"
            
            # Memory configuration
            - name: ES_JAVA_OPTS
              value: "-Xms256m -Xmx512m"
            
            # Security (disabled for development)
            - name: xpack.security.enabled
              value: "false"
            - name: xpack.security.enrollment.enabled
              value: "false"
            
            # Disable ML and other features for lightweight deployment
            - name: xpack.ml.enabled
              value: "false"
          
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
          
          # Readiness probe
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: http
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Liveness probe
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: http
              scheme: HTTP
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Resource requests
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      
      volumes:
        - name: elasticsearch-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: elk
  labels:
    app: elasticsearch

spec:
  type: ClusterIP
  
  selector:
    app: elasticsearch
  
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: node
      port: 9300
      targetPort: 9300

---
# Access Elasticsearch from fraudguard-app:
# - DNS: elasticsearch.elk.svc.cluster.local:9200
# - Verify: kubectl exec -it <fraudguard-pod> -- curl http://elasticsearch.elk.svc.cluster.local:9200
