---
# FraudGuard Kubernetes Service
# Exposes the fraudguard-app deployment via NodePort
# Accessible at: http://<minikube-ip>:30080

apiVersion: v1
kind: Service
metadata:
  name: fraudguard-app
  namespace: fraudguard
  labels:
    app: fraudguard
    component: api
  annotations:
    description: "NodePort service for FraudGuard API"

spec:
  type: NodePort
  
  selector:
    app: fraudguard
    component: api
  
  # Port mapping
  ports:
    - name: http
      protocol: TCP
      port: 80                    # Service port (ClusterIP)
      targetPort: 8000           # Container port
      nodePort: 30080            # External NodePort (30000-32767 range)
  
  # Session affinity (optional)
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
# Kubernetes Endpoints (automatically managed by Service selector)
# Points to pods matching label selector: app=fraudguard, component=api

---
# DNS entry will be: fraudguard-app.default.svc.cluster.local
# Access methods:
# - Cluster internal: curl http://fraudguard-app/health
# - NodePort: curl http://<node-ip>:30080/health
# - Port-forward: kubectl port-forward svc/fraudguard-app 8000:80
# - Minikube service: minikube service fraudguard-app --url
